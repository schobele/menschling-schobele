# Local development overrides
# This file is automatically loaded by `docker compose up`
# Delete or rename to .disabled for production
services:
  menschling:
    build:
      context: .
      target: base
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3200:3200"

  paperclip:
    ports:
      - "3100:3100"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
